server:
  port: 8080

spring:
  application:
    name: ms-desafio
  datasource:
    url: jdbc:h2:mem:msdesafio
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    defer-datasource-initialization: true
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always

springdoc:
  swagger-ui:
    path: /swagger-ui.html
